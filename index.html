<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Toolset</title>
    <link rel="stylesheet" href="shared/css/base.css" />
  </head>
  <body>
    <main>
      <h1 id="home-title">Toolset</h1>
      <p id="home-description" class="helper"></p>
      <section id="modules" class="card-grid" aria-label="Módulos"></section>
    </main>
    <script type="module">
      import { fetchJson } from './shared/js/core.js';

      const titleEl = document.getElementById('home-title');
      const descriptionEl = document.getElementById('home-description');
      const modulesEl = document.getElementById('modules');

      try {
        const config = await fetchJson('./config/processes.json');

        document.title = config.appName || 'Toolset';
        titleEl.textContent = config.homeTitle || config.appName || 'Toolset';
        descriptionEl.textContent = config.homeDescription || '';

        const processes = Array.isArray(config.processes) ? config.processes : [];
        modulesEl.innerHTML = '';

        for (const process of processes) {
          const card = document.createElement('article');
          card.className = 'card';
          card.innerHTML = `
            <h2>${process.name}</h2>
            <p class="helper">${process.description || ''}</p>
            <a class="button" href="${process.path}">Abrir</a>
          `;
          modulesEl.appendChild(card);
        }
      } catch (error) {
        descriptionEl.textContent = 'Error cargando la configuración inicial.';
        console.error(error);
      }
    </script>
  </body>
</html>
