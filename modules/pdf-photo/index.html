<!doctype html>
<html lang="es">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Generador PDF de fotos</title>
    <link rel="stylesheet" href="../../shared/css/base.css" />
  </head>
  <body>
    <main>
      <p><a href="../../index.html">← Volver al home</a></p>
      <h1>Generador de impresión fotográfica A4</h1>
      <p class="helper">
        Carga tus fotos y genera un documento imprimible con recortes de 3" x 2" acomodados automáticamente.
      </p>

      <section class="card" style="display: grid; gap: 12px">
        <label>
          <strong>Fotos</strong><br />
          <input id="photo-input" type="file" accept="image/*" multiple />
        </label>
        <div class="helper" id="summary">No hay fotos cargadas.</div>
        <div id="list" class="list" aria-live="polite"></div>
        <button id="generate" disabled>Generar archivo para imprimir</button>
      </section>
    </main>

    <script type="module">
      import { readFilesAsDataURLs } from '../../shared/js/core.js';
      import { renderPhotoList } from './functions/render.js';
      import { generatePrintPopup } from './functions/generate-print.js';

      const input = document.getElementById('photo-input');
      const list = document.getElementById('list');
      const summary = document.getElementById('summary');
      const generateButton = document.getElementById('generate');

      const pageConfigs = [
        { widthIn: 8.27, heightIn: 11.69, marginIn: 0.2, gapIn: 0.05, pageSize: 'A4 portrait' },
        { widthIn: 11.69, heightIn: 8.27, marginIn: 0.2, gapIn: 0.05, pageSize: 'A4 landscape' }
      ];
      const tileConfigs = [
        { widthIn: 2.7, heightIn: 1.8 },
        { widthIn: 1.8, heightIn: 2.7 }
      ];

      let images = [];

      function render() {
        renderPhotoList(images, list, summary, generateButton, pageConfigs, tileConfigs);
      }

      input.addEventListener('change', async () => {
        try {
          images = await readFilesAsDataURLs(input.files || []);
          render();
        } catch (error) {
          console.error(error);
          summary.textContent = 'No se pudieron cargar las imágenes.';
        }
      });

      generateButton.addEventListener('click', () => {
        generatePrintPopup(images, pageConfigs, tileConfigs);
      });

      render();
    </script>
  </body>
</html>
